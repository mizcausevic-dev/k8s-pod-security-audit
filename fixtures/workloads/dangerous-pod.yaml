apiVersion: v1
kind: Pod
metadata:
  name: bad-pod
  namespace: production
spec:
  hostNetwork: true
  containers:
    - name: app
      image: ghcr.io/example/app:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        capabilities:
          add: ["SYS_ADMIN", "NET_RAW"]
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
